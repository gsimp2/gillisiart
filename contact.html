---
layout: default
title: Home
---
<style>
	.hero {
		background-image: url('{{ "assets/images/stack5-icon.JPG" | relative_url }}');
	}
</style>
<script src="{{ '/assets/js/contact.js' | relative_url }}"></script>

<!-- About Section -->
<div class="container">
	<div class="contact-text">
		<h2>Contact</h2>
		<p>If you have any business inquiries or questions contact me here or at <a href="mailto:gillisiart@gmail.com"
				class="contact-link">gillisiart@gmail.com</a></p>
		<form class="contact-form" onsubmit="handleSubmit(event)">
			<div class="form-group">
				<label for="name">Name</label>
				<input type="text" id="name" name="name" required>
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" required>
			</div>
			<div class="form-group">
				<label for="message">Message</label>
				<textarea id="message" name="message" required></textarea>
			</div>
			<button type="submit" class="btn">Send</button>
		</form>
	</div>
